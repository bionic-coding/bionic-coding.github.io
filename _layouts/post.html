---
layout: default
---
<article class="page post">
  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    <p class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%B %-d, %Y' }}</time></p>
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
