        - heading "Two states and the crossing between them" [level=2] [ref=e57]
        - paragraph [ref=e58]:
          - text: "There is a state in which Bionic Coding is simply how you work: invariants are pinned, code is disposable, regeneration is routine. Call it"
          - strong [ref=e59]: the Steady State
          - text: . Everything confident in this manifesto describes that state.
        - paragraph [ref=e60]:
          - text: Almost no one starts there. Almost all software begins on the far side — a codebase whose invariants were never written down, whose intent lives in the code itself and in the heads of people who may be gone. Between where you are and the Steady State lies
          - strong [ref=e61]: the Crossing
          - text: ", and the Crossing is where every real adopter actually lives. Read the two movements as what they are — a destination, and the discipline of getting there. The Steady State’s confidence is not license for the far shore: “code is disposable” is true once you are across; said on day one to a team still holding unsurveyed legacy code, it is the most dangerous sentence in the document."
        - separator [ref=e62]
        - heading "Movement I — The Steady State" [level=1] [ref=e63]
        - paragraph [ref=e64]:
          - emphasis [ref=e65]: What Bionic Coding is once you are across. The confident voice below assumes the invariants have already been recovered, pinned, and ratified. If that is not yet true of your system, this movement describes where you are going, not where you may act.
        - paragraph [ref=e66]:
          - text: The factors divide into two kinds, and they read as an arc. The opening
          - strong [ref=e67]: practices
          - text: "(1–2) establish the stance: intent is the source of truth, and code is held loosely. The"
          - strong [ref=e68]: invariants
          - text: (3–7) are
          - emphasis [ref=e69]: what you preserve
          - text: "— the load-bearing walls a regeneration must never move: state, structure, behavior, boundary, and experience. The closing"
          - strong [ref=e70]: practices
          - text: "(8–11) make the stance safe to hold: verification, amendment, augmentation, and regeneration itself."
        - heading "1. Intent" [level=2] [ref=e71]
        - heading "The pinned invariants are the source of truth; code is derived" [level=3] [ref=e72]
        - paragraph [ref=e73]:
          - text: Write down what must be true, not how to make it true. The durable artifact is the set of explicitly pinned invariants — and an invariant that is not written down is not an invariant, it is a hope. Pinning is the act of drawing the line between the contract and the implementation detail; everything on the implementation side of that line is free. Intent also includes the trail of decisions that explains
          - emphasis [ref=e74]: why
          - text: the invariants are what they are — keep that record, though its form is still unsettled (Architecture Decision Records are one attempt, not the answer). The codebase demotes from
          - emphasis [ref=e75]: the
          - text: artifact to
          - emphasis [ref=e76]: an
          - text: "artifact: one of many valid outputs."
        - heading "2. Disposability" [level=2] [ref=e77]
        - heading "Code is a build artifact; hold it loosely" [level=3] [ref=e78]
        - paragraph [ref=e79]:
          - text: "You do not hand-edit assembly and check it back in — you fix the source and recompile. Generated code earns the same status: downstream, replaceable, never guarded. Attachment to a piece of code is a smell that its intent was never captured and the code is silently acting as the specification. The goal state is that code is the cheapest, most replaceable thing you own, and the team feels free to throw it away."
          - emphasis [ref=e80]: (In the Steady State this is a standing freedom. On the far shore it is not yet true — disposability is earned, module by module. See the Crossing.)
        - heading "3. Preserve the data" [level=2] [ref=e81]
        - heading "Data outlives every implementation" [level=3] [ref=e82]
        - paragraph [ref=e83]: "Files, databases, configuration, secrets, accumulated state. The invariant here is survival, not the data itself: data is the asset the pins exist to protect, and the one thing in the system you cannot regenerate — code can be rebuilt from intent; data cannot. Any regeneration that touches data must do so through explicit, reversible, verified migration, never as a side effect of rewriting the code that owns it. This is the most sacred pin in the set, precisely because it guards the only irreplaceable thing."
        - heading "4. Preserve the shape" [level=2] [ref=e84]
        - heading "The structure of data is a contract even when the code that reads it is not" [level=3] [ref=e85]
        - paragraph [ref=e86]:
          - text: Schemas, models, facades, serialization formats, the field a downstream consumer depends on being an integer. The
          - emphasis [ref=e87]: shape
          - text: of structured data is an interface with everything that touches it — including future versions of the app. Pin the shape; let the code that maps to and from it be regenerated at will.
        - heading "5. Preserve the behavior" [level=2] [ref=e88]
        - heading "The rules the logic must obey are invariants, even when nothing at the boundary reveals them" [level=3] [ref=e89]
        - paragraph [ref=e90]:
          - text: Some invariants are neither state, nor structure, nor a boundary promise, nor a user-facing flow — they are the correctness rules the domain itself imposes. An order’s total equals the sum of its line items. A balance never goes negative. A state machine only advances along legal edges. These functional invariants are the easiest to lose, because they live only in the logic and rarely announce themselves. Pin them as properties and rules, independent of the code that currently enforces them. This is the class characterization tests most often recover — which is why it is also the class where
          - emphasis [ref=e91]: observed is not ratified
          - text: bites hardest.
        - heading "6. Preserve the contracts" [level=2] [ref=e92]
        - heading "Pin the boundary; the interior is fluid" [level=3] [ref=e93]
        - paragraph [ref=e94]: Every API the system exposes and every API it depends on — inbound and outbound, synchronous calls and webhooks, public and internal. These are the promises the system makes to the outside world and relies on from it. The boundary is where regeneration is dangerous, and therefore where pinning is mandatory. Behind it, the code is free.
        - heading "7. Preserve the experience" [level=2] [ref=e95]
        - heading "Pin the behaviors users rely on, not the widgets that render them" [level=3] [ref=e96]
        - paragraph [ref=e97]: "The user has a contract too, even if it was never written down: the flow that must not add a step, the shortcut that must keep working, the latency they expect, the words on the button that support tickets reference. Capture the experience-level invariants explicitly. Then the UI implementation — components, framework, markup — becomes as disposable as any other code."
        - heading "8. Verify against the invariants" [level=2] [ref=e98]
        - heading "Disposability extends exactly as far as verification reaches" [level=3] [ref=e99]
        - paragraph [ref=e100]: "The factor that makes the rest safe — and the one place this manifesto must not overclaim. A test suite is a sample, not a proof: a regeneration that passes every pin has been shown to honor the suite, and nothing more. So the discipline is twofold."
        - paragraph [ref=e101]: First, make every invariant as executable as it can be — a contract test, a golden test, a property, a schema check, a migration assertion. A pinned invariant with no verification at all is decoration.
        - paragraph [ref=e102]:
          - text: "Second, be honest about the invariants that resist execution: security properties, latency budgets, concurrency behavior, resource cost. These do not stop being invariants because they are hard to test — they stop being"
          - emphasis [ref=e103]: cheap to regenerate around
          - text: . Verification strength is a dimension of every pin, and disposability extends exactly as far as it reaches. Where verification is strong, regenerate freely. Where it is weak, the surrounding code is less disposable than you would like, and the honest move is to say so. The suite is not the definition of the system — it is the strongest available approximation, and making one more invariant executable is some of the highest-leverage work in the methodology, because every pin that becomes testable makes a region of code freer.
        - heading "9. Amend the invariants" [level=2] [ref=e104]
        - heading "Durable is not frozen; change the system by changing its pins" [level=3] [ref=e105]
        - paragraph [ref=e106]:
          - text: Requirements change. That is not an exception to Bionic Coding — it is most of what development
          - emphasis [ref=e107]: is
          - text: "in the Steady State. A change of requirements is an amendment to the invariant set: a pin added, a pin revised, a pin retired — followed by regeneration. Never the reverse. If you find yourself changing code first, then either the change was implementation detail all along (fine, that side of the line is free) or an invariant just moved without anyone deciding it (not fine — that is how the suite and the intent drift apart until the suite is silently the wrong definition of the system)."
        - paragraph [ref=e108]:
          - text: "Amendment is a judgment act, so it carries the full weight of factor 1: a human decides, the decision is recorded, and the"
          - emphasis [ref=e109]: why
          - text: "joins the decision trail. Retirement is explicit — a pin you quietly stop enforcing becomes a lie in the suite. And conflict is a feature, not an embarrassment: when a new invariant contradicts a ratified old one, the contradiction surfaces at the pin level, where it can be argued about and resolved, instead of at the code level, where it becomes a bug."
        - heading "10. Augment, don’t abdicate" [level=2] [ref=e110]
        - heading "The human owns the invariants; the machine owns the manufacturing" [level=3] [ref=e111]
        - paragraph [ref=e112]: Bionic, not automatic. Deciding what must be true, what must never break, and how correctness is proven is judgment, and judgment does not delegate. Generating, refactoring, and rewriting the code that satisfies those decisions is manufacturing, and manufacturing should be handed to the machine as completely as possible. Keep the manufacturing and you are back to traditional cost; give away the judgment and you are back to vibe-coding amnesia.
        - heading "11. Regeneration" [level=2] [ref=e113]
        - heading "Rebuild from intent on demand; the capability is the asset" [level=3] [ref=e114]
        - paragraph [ref=e115]:
          - text: The ability to regenerate the system from its invariants is worth more than any output it produces. Exercise it constantly. If regeneration is a rare, terrifying event, you have quietly slipped back into treating the code as precious. If you are holding code you could not regenerate, you do not understand it, and it owns you rather than the reverse —
          - emphasis [ref=e116]: and the way out is not to distrust it forever, but to recover it. That is the Crossing.
        - separator [ref=e117]
        - heading "Movement II — The Crossing" [level=1] [ref=e118]
        - paragraph [ref=e119]:
          - emphasis [ref=e120]: How you get from a legacy codebase to the Steady State. The voice here is deliberately more cautious than Movement I, because on the far shore certainty is the thing you have least of.
        - paragraph [ref=e121]:
          - text: "Movement I ended on a distrust it never resolved: code you cannot regenerate owns you. Distrust is a diagnosis, not a cure. The cure is to"
          - strong [ref=e122]: recover
          - text: — to turn code you cannot regenerate into invariants you can regenerate against. That work has a name the introduction used as an insult. We reclaim it here.
        - heading "i. Start by admitting where you are" [level=2] [ref=e123]
        - heading "Almost all software begins on the far shore" [level=3] [ref=e124]
        - paragraph [ref=e125]:
          - text: The three-way table is not three places you might sit; it is a journey most teams have to make. Your system’s invariants are real but unwritten — encoded in behavior, in schemas, in the boundary, and thinnest of all in anyone’s memory of
          - emphasis [ref=e126]: why
          - text: . The transition is not a preamble to Bionic Coding. For most adopters it
          - emphasis [ref=e127]: is
          - text: the work, and pretending you are already in the Steady State is how teams delete things they did not know were load-bearing.
        - heading "ii. Recover before you regenerate" [level=2] [ref=e128]
        - heading "Archaeology is the method, not the failure state" [level=3] [ref=e129]
        - paragraph [ref=e130]:
          - text: "When intent is lost, the code becomes an archaeological dig — the introduction meant that as the fate of an abandoned system. Here it is the discipline that gets you out. Before you may treat any code as disposable, you excavate it: read the state, the schema, the behavior, the boundary, the flows, and the history, and lift the buried invariants into the light. The classes recover with very different confidence. Shape and contracts come almost mechanically — the schema and the boundary are already legible. Behavior comes at scale but only as"
          - emphasis [ref=e131]: candidates
          - text: ", since a characterization test captures what the code does, bugs and all — and this is the class the dig turns up most of. Data you do not recover so much as guard: it is simply there, and must survive the crossing uncorrupted. Experience you recover by observation. And the"
          - emphasis [ref=e132]: why
          - text: barely recovers at all — it can only be reconstructed, and only provisionally. Recovery is not a phase you rush; it is the price of the freedom Movement I describes.
        - heading "iii. Unpinned is unsurveyed, not free" [level=2] [ref=e133]
        - heading "On legacy code, the default inverts" [level=3] [ref=e134]
        - paragraph [ref=e135]:
          - text: This is the single most important correction to Movement I. In the Steady State, everything unpinned is free to regenerate. On the far shore,
          - strong [ref=e136]: unpinned does not mean free — it means unsurveyed.
          - text: Most load-bearing intent in old code is unpinned precisely because nobody wrote it down. To treat unpinned as disposable there is to license deleting the exact truth you have not recovered yet. Until a region is surveyed, unpinned code is unexplored territory to map, never licensed to delete.
        - heading "iv. Observed is not ratified" [level=2] [ref=e137]
        - heading "Recovery produces candidates; judgment produces invariants" [level=3] [ref=e138]
        - paragraph [ref=e139]:
          - text: A characterization test cements whatever the code currently does —
          - emphasis [ref=e140]: bugs included
          - text: . A behavior lifted from running code is therefore a
          - emphasis [ref=e141]: candidate
          - text: ", not an invariant: it might be a three-year-old bug you are about to make permanent. Factor 10 — augment, don’t abdicate — reaches backward in time here. Recovery produces candidates at machine scale; a human converts a candidate into an invariant by examining it and deciding it is intended. What you cannot yet examine is not a failure and not a lie; it is an honest known-unknown that must be"
          - emphasis [ref=e142]: marked
          - text: as such rather than silently promoted.
        - heading "v. Mark provenance; never launder a guess into a guarantee" [level=2] [ref=e143]
        - heading "Every invariant carries where it came from" [level=3] [ref=e144]
        - paragraph [ref=e145]:
          - text: The
          - emphasis [ref=e146]: why
          - text: is categorically less recoverable than the
          - emphasis [ref=e147]: what
          - text: ". Behavior, shape, and contracts you recover; intent you can only reconstruct from git history, pull requests, and tickets — and a reconstruction is a guess. So every invariant carries a provenance, and the provenance travels with it:"
        - list [ref=e148]:
          - listitem [ref=e149]:
            - strong [ref=e150]: authored
            - text: — written by a human as intent. First-class.
          - listitem [ref=e151]:
            - strong [ref=e152]: recovered-and-ratified
            - text: — extracted from behavior, then examined and confirmed as intended. Trustworthy.
          - listitem [ref=e153]:
            - strong [ref=e154]: observed-unratified
            - text: — faithfully reproduced from behavior but not yet examined. A known-unknown; this is where the risk concentrates.
          - listitem [ref=e155]:
            - strong [ref=e156]: reconstructed-and-provisional
            - text: — the inferred
            - emphasis [ref=e157]: why
            - text: . A guess, marked as a guess, never laundered into authority.
        - paragraph [ref=e158]: "Treating a guess as a guarantee is its own failure mode, and it is the one that hurts most later. Provenance also outlives the Crossing: when a pin is later amended (factor 9), the amendment is a human decision, so the pin is re-authored — amendment is one of the ways a recovered invariant graduates to first-class."
        - heading "vi. Earn disposability, module by module" [level=2] [ref=e159]
        - heading "Freedom is granted per region as its invariants become trustworthy — not by a number" [level=3] [ref=e160]
        - paragraph [ref=e161]:
          - text: "Disposability is not a state you switch on; it is a gradient you earn, and two independent questions govern it:"
          - strong [ref=e162]: is the invariant real
          - text: — ratification, the judgment of iv and v — and
          - strong [ref=e163]: can we prove an implementation honors it
          - text: "— verification, the strength factor 8 measures. Every combination of the two exists. Ratified and strongly verified is freedom. Ratified but weakly verified is a real invariant with narrow freedom around it — the latency budget everyone agrees is load-bearing but nobody can test reliably. Unratified but strongly verified is the trap: a passing characterization test that may be cementing a three-year-old bug, dangerous precisely because the green check makes it look trustworthy. Unratified and unverified is simply unsurveyed. A module becomes safe to regenerate to the degree the invariants around it answer"
          - emphasis [ref=e164]: "yes"
          - text: "to both questions — and only then does Movement I’s confidence apply to it. Resist the urge to make this a metric. There is no coverage percentage that licenses deletion; line-coverage is the cautionary tale, since you can reach a hundred percent and pin nothing real. The threshold is qualitative and human:"
          - emphasis [ref=e165]: do we trust the invariants here enough to throw the code away?
          - text: "When the answer is yes for a region, that region has crossed. When it is yes everywhere, you are in the Steady State — and Movement I is simply how you live, with one caveat you carry across the water: even there, disposability extends only as far as verification reaches (factor 8). The gradient never fully disappears; it just stops being frightening."
