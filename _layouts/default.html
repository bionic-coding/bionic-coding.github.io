<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.url != '/' %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.description | strip_newlines }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines | escape }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <meta name="theme-color" content="#f2f4f8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0e1116" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="512x512" href="{{ '/assets/bionic-code-512.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="256x256" href="{{ '/assets/bionic-code-256.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/bionic-code-256.png' | relative_url }}">
  {%- feed_meta -%}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        {%- for path in site.header_pages -%}
          {%- assign p = site.pages | where: "path", path | first -%}
          {%- if p.title -%}<a href="{{ p.url | relative_url }}">{{ p.title }}</a>{%- endif -%}
        {%- endfor -%}
      </nav>
    </div>
  </header>

  <main class="wrap" role="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <span class="tagline">Durable intent, disposable code.</span>
      <span class="colophon">© {{ site.time | date: '%Y' }} {{ site.title }} · <a href="https://github.com/{{ site.github_username }}">GitHub</a></span>
    </div>
  </footer>
</body>
</html>
