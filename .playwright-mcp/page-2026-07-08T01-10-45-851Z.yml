      - generic [ref=e9]:
        - heading "The Bionic Coding Manifesto" [level=1] [ref=e10]
        - paragraph [ref=e11]: Durable intent, disposable code.
      - generic [ref=e12]:
        - heading "Introduction" [level=2] [ref=e13]
        - paragraph [ref=e14]: For fifty years we have treated source code as the asset. We version it, review it, refactor it, and mourn it when it rots. We hire around it. We let it define the shape of our teams.
        - paragraph [ref=e15]:
          - text: This was always a category error. Code is not the asset. Code is an
          - emphasis [ref=e16]: intermediary
          - text: — a lossy, disposable projection of intent onto a machine, no more precious than the assembly it compiles down to. We stopped reading assembly the moment compilers earned our trust. We are now reaching the same moment with code itself.
        - paragraph [ref=e17]:
          - strong [ref=e18]: Bionic Coding
          - text: is a methodology for building software in which the code is understood to be throwaway, and the
          - emphasis [ref=e19]: invariants
          - text: — the things that must survive regeneration — are the only durable artifacts. You do not maintain code. You maintain a set of pinned invariants and the ability to regenerate a faithful implementation from them, on demand, cheaply, and provably.
        - paragraph [ref=e20]:
          - text: The word is deliberate.
          - emphasis [ref=e21]: Bionic
          - text: ", not automatic. The human is not removed from the loop; the human is augmented. And the augmentation runs in the opposite direction from autocomplete: the machine is not helping the human write code — the human is supplying the judgment the machine’s manufacturing cannot. The machine takes over the manufacturing of code. The human keeps what manufacturing cannot supply: what must be true, what must never break, and how you would know."
        - heading "Bionic Coding vs. everything before it" [level=2] [ref=e22]
        - paragraph [ref=e23]:
          - strong [ref=e24]: Traditional applications
          - text: treat the code as the source of truth. Everything downstream is derived from the code, and the code is derived from a developer’s head. When the developer leaves, the intent leaves with them, and the code becomes an archaeological dig — one nobody chose to run.
        - paragraph [ref=e25]:
          - strong [ref=e26]: Vibe coding
          - text: ", at least in its purest form, treats the code as throwaway but treats the"
          - emphasis [ref=e27]: intent
          - text: "as throwaway too. It is prompting without pinning: you ask, you get something that runs, you ship it, and neither you nor anyone else can say precisely what it guarantees. Fast, and fragile. It discards the discipline along with the code."
        - paragraph [ref=e28]:
          - strong [ref=e29]: Bionic coding
          - text: throws away the code and keeps the discipline — moving that discipline to where it belongs. The code was never the thing worth preserving. The invariants were. So pin those, make them executable, and let the implementation be regenerated as freely as you recompile.
