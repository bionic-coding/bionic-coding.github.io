---
layout: default
---
<article class="page">
  {%- if page.title -%}
  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {%- if page.description -%}<p class="page-subtitle">{{ page.description }}</p>{%- endif -%}
  </header>
  {%- endif -%}
  <div class="prose">
    {{ content }}
  </div>
</article>
