# docs/manifest.yml — schema + per-concern config for this project's docs/ tree.
# Owned by init-docs (creates), audit-docs (reads/repairs), other skills (read).
# Treat this file as authoritative: skills look here before touching docs/.

# Schema version. Bumps only on breaking layout changes. The installed plugin
# refuses to operate on a docs/ tree whose schema_version is outside its
# supported range (currently == "3"); run audit-docs --migrate after upgrading
# the plugin. v3 retired research/new/ for the unified docs/inbox/.
schema_version: "3"

# Concerns this project has opted into. Skills no-op against a concern that
# isn't enabled. Order is irrelevant.
concerns_enabled:
  - research
  - adrs
  - briefs
  - journal
  - promptbooks

# Research concern.
research:
  # How often refresh-research-sources is expected to re-check upstream URLs.
  # Sources older than this with source_url != null and static != true become
  # candidates for refresh. Default 90 days.
  refresh_interval_days: 90

# ADR allocation. propose-adr reads adr.next_number, allocates it, writes the
# new ADR, and increments this field atomically. Numbers are NEVER reused.
adr:
  next_number: 5

# Promptbook allocation. Same contract as adr.next_number — monotonic, never
# reused. Forks always allocate a fresh id.
promptbook:
  next_number: 1
